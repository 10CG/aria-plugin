# GitHub Secret Scanning push-protection allowlist
#
# Per memory feedback_github_secret_scanning_push_range_blocks_history:
# realistic-looking test fixtures (sk_live_/ghp_/sk-silk-/Slack URL/Postgres URL)
# are intentionally embedded in our regression test files to verify that
# secret-scan.sh + secret-guard.sh regex patterns correctly catch them.
# GitHub's secret scanner does not distinguish test fixtures from real
# tokens, so these files would otherwise block every push to master.
#
# Scope: ONLY hook regression test files at known paths. Production
# hook code, skill code, and documentation are NOT excluded — they
# should never contain real or fixture secrets.
#
# Source incident: 2026-05-23 aria-plugin v1.24.0 ship attempt blocked
# by 5+ unblock-secret URLs; resolved via owner click + sanitization;
# this allowlist prevents recurrence.

paths-ignore:
  # Hook regression test fixtures (intentional realistic patterns to
  # validate regex matching). Hook source code itself is NOT excluded.
  - "hooks/tests/secret-guard.test.sh"
  - "hooks/tests/secret-scan.test.sh"
